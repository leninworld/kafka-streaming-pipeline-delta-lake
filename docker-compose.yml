x-spark-image: &spark-image
  build:
    context: .
    dockerfile: Dockerfile.spark
  image: kafka-spark:3.5.1-delta

x-notebook-image: &notebook-image
  build:
    context: .
    dockerfile: Dockerfile.notebook
  image: kafka-spark-notebook:3.5.1-delta

x-delta-classpath: &delta-classpath
  CLASSPATH: /opt/spark/jars/delta-spark_2.12-3.0.0.jar:/opt/spark/jars/delta-storage-3.0.0.jar
  SPARK_CLASSPATH: /opt/spark/jars/delta-spark_2.12-3.0.0.jar:/opt/spark/jars/delta-storage-3.0.0.jar

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  hive-metastore:
    image: apache/hive:4.0.0
    container_name: hive-metastore
    restart: unless-stopped
    environment:
      SERVICE_NAME: metastore
    ports:
      - "9083:9083"
    volumes:
      - hive_warehouse:/opt/hive/data/warehouse
    command: >
      bash -lc "
      /opt/hive/bin/schematool -dbType derby -initSchema ||
      /opt/hive/bin/schematool -dbType derby -info;
      exec /opt/hive/bin/hive --skiphadoopversion --skiphbasecp --service metastore
      "

  spark-master:
    <<: *spark-image
    container_name: spark-master
    restart: unless-stopped
    environment:
      <<: *delta-classpath
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - delta_data:/delta
      - ./notebooks:/opt/spark/notebooks

  spark-worker:
    image: kafka-spark:3.5.1-delta
    container_name: spark-worker
    restart: unless-stopped
    environment:
      <<: *delta-classpath
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    ports:
      - "8081:8081"
    volumes:
      - delta_data:/delta
      - ./notebooks:/opt/spark/notebooks

  spark-streaming:
    image: kafka-spark:3.5.1-delta
    container_name: spark-streaming
    restart: unless-stopped
    environment:
      <<: *delta-classpath
    depends_on:
      - kafka
      - spark-master
    volumes:
      - delta_data:/delta
      - ./notebooks:/opt/spark/notebooks
      - ./spark_jobs:/opt/spark/jobs
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --packages io.delta:delta-spark_2.12:3.0.0,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      --conf spark.jars.ivy=/tmp/.ivy2
      --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
      --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
      /opt/spark/jobs/streaming_job.py

  spark-thrift:
    image: kafka-spark:3.5.1-delta
    container_name: spark-thrift
    restart: unless-stopped
    environment:
      <<: *delta-classpath
    depends_on:
      - spark-master
      - hive-metastore
    ports:
      - "10000:10000"
      - "4040:4040"
    volumes:
      - delta_data:/delta
      - ./notebooks:/opt/spark/notebooks
    command: >
      bash -c "
      echo 'Waiting for Hive Metastore on hive-metastore:9083...';
      until bash -lc 'exec 3<>/dev/tcp/hive-metastore/9083' 2>/dev/null; do
        sleep 2;
      done;
      /opt/spark/sbin/start-thriftserver.sh
      --master spark://spark-master:7077
      --packages io.delta:delta-spark_2.12:3.0.0
      --jars /opt/spark/jars/delta-spark_2.12-3.0.0.jar,/opt/spark/jars/delta-storage-3.0.0.jar
      --conf spark.driver.extraClassPath=/opt/spark/jars/delta-spark_2.12-3.0.0.jar:/opt/spark/jars/delta-storage-3.0.0.jar
      --conf spark.executor.extraClassPath=/opt/spark/jars/delta-spark_2.12-3.0.0.jar:/opt/spark/jars/delta-storage-3.0.0.jar
      --conf spark.cores.max=4
      --conf spark.executor.cores=2
      --conf spark.hadoop.hive.metastore.uris=thrift://hive-metastore:9083
      --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
      --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
      --conf spark.sql.warehouse.dir=/delta/warehouse
      --hiveconf hive.server2.authentication=NOSASL
      --hiveconf hive.server2.thrift.resultset.default.fetch.size=1000
      --conf spark.jars.ivy=/tmp/.ivy2
      && tail -F /opt/spark/logs/spark--org.apache.spark.sql.hive.thriftserver.HiveThriftServer2-1-*.out
      "

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset
    restart: unless-stopped
    depends_on:
      - spark-thrift
    ports:
      - "8088:8088"
    volumes:
      - delta_data:/delta
      - superset_home:/app/superset_home
    environment:
      SUPERSET_SECRET_KEY: "a23c4947d0a4ce608a36b6a5a546276b2e21812560331b919229031fe0ea2003"

  spark-register:
    image: kafka-spark:3.5.1-delta
    container_name: spark-register
    environment:
      <<: *delta-classpath
    depends_on:
      - spark-thrift
      - hive-metastore
    volumes:
      - delta_data:/delta
      - ./notebooks:/opt/spark/notebooks
      - ./spark_jobs:/opt/spark/jobs
    command: >
      bash -c "
      echo 'Waiting for Hive Metastore on hive-metastore:9083...';
      until bash -lc 'exec 3<>/dev/tcp/hive-metastore/9083' 2>/dev/null; do
        sleep 2;
      done;
      echo 'Waiting for Spark Thrift Server on spark-thrift:10000...';
      until bash -lc 'exec 3<>/dev/tcp/spark-thrift/10000' 2>/dev/null; do
        sleep 2;
      done;
  
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --packages io.delta:delta-spark_2.12:3.0.0
      --jars /opt/spark/jars/delta-spark_2.12-3.0.0.jar,/opt/spark/jars/delta-storage-3.0.0.jar
      --conf spark.driver.extraClassPath=/opt/spark/jars/delta-spark_2.12-3.0.0.jar:/opt/spark/jars/delta-storage-3.0.0.jar
      --conf spark.executor.extraClassPath=/opt/spark/jars/delta-spark_2.12-3.0.0.jar:/opt/spark/jars/delta-storage-3.0.0.jar
      --conf spark.hadoop.hive.metastore.uris=thrift://hive-metastore:9083
      --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
      --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
      --conf spark.sql.warehouse.dir=/delta/warehouse
      --conf spark.jars.ivy=/tmp/.ivy2
      /opt/spark/jobs/register_delta_table.py
      "

  jupyter:
    <<: *notebook-image
    container_name: jupyter
    restart: unless-stopped
    depends_on:
      - spark-master
      - hive-metastore
      - kafka
    environment:
      <<: *delta-classpath
      SPARK_MASTER_URL: spark://spark-master:7077
    ports:
      - "8888:8888"
    volumes:
      - delta_data:/delta
      - ./notebooks:/opt/spark/notebooks
      - ./spark_jobs:/opt/spark/jobs
      - ./apps:/opt/apps

  fastapi:
    <<: *notebook-image
    container_name: fastapi
    restart: unless-stopped
    depends_on:
      - jupyter
    ports:
      - "8000:8000"
    volumes:
      - ./apps:/opt/apps
      - ./notebooks:/opt/spark/notebooks
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --app-dir /opt/apps/fastapi

  tensorflow-serving:
    image: tensorflow/serving
    container_name: tensorflow-serving
    profiles:
      - serving
    restart: unless-stopped
    ports:
      - "8500:8500"
      - "8501:8501"
    environment:
      MODEL_NAME: example_model
      MODEL_BASE_PATH: /models
    volumes:
      - ./models/tensorflow:/models

  tf-builder:
    image: tensorflow/tensorflow:2.13.0
    profiles:
      - tools
    working_dir: /workspace
    volumes:
      - ./:/workspace

  torchserve:
    image: pytorch/torchserve:latest-cpu
    container_name: torchserve
    profiles:
      - serving
    restart: unless-stopped
    ports:
      - "9181:8080"
      - "9182:8081"
      - "9183:8082"
    volumes:
      - ./models/torchserve/demo:/home/model-server/demo
      - ./models/torchserve/model-store:/home/model-server/model-store
      - ./models/torchserve/config:/home/model-server/config
    command: >
      torchserve --start --foreground
      --model-store /home/model-server/model-store
      --ts-config /home/model-server/config/config.properties

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles:
      - monitoring
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  delta_data:
  superset_home:
  hive_warehouse:
