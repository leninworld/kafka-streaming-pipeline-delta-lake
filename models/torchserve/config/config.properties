# Bind all three TorchServe endpoints inside the container.
inference_address=http://0.0.0.0:8080
management_address=http://0.0.0.0:8081
metrics_address=http://0.0.0.0:8082
model_store=/home/model-server/model-store

# Disable token auth for local learning demos so the endpoints are easy to try.
disable_token_authorization=true

# Auto-load the demo model archive when TorchServe starts.
load_models=demo_math.mar
